{% extends "MainApp/base.html" %}
{% load bootstrap4 %}

{% block content %}
  <div class="card col-md-6 offset-md-3">
    <div class="card-header">Register a new account</div>
    <div class="card-body">
      <form method="post" action="{% url 'users:register' %}" class="form">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% buttons %}
          <button name="submit" class="btn btn-primary btn-block">Register</button>
        {% endbuttons %}
        <input type="hidden" name="next" value="{% url 'MainApp:index' %}" />
      </form>
    </div>
  </div>
{% endblock content %}
