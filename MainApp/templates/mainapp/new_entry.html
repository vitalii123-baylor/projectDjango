{% extends "MainApp/base.html" %}
{% load bootstrap4 %}

{% block content %}
  <h3><a href="{% url 'MainApp:topic' topic.id %}">{{ topic }}</a></h3>
  <h4 class="mb-4">Add a new entry:</h4>

  <form action="{% url 'MainApp:new_entry' topic.id %}" method="post" class="form">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% buttons %}
      <button name="submit" class="btn btn-primary">Add entry</button>
    {% endbuttons %}
  </form>
{% endblock content %}
