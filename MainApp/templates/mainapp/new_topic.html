{% extends "MainApp/base.html" %}
{% load bootstrap4 %}

{% block content %}
<div class="row justify-content-center pt-5">
  <div class="col-md-6">
    <div class="card border-0 shadow-lg p-4" style="border-radius: 20px;">
      <div class="card-body">
        <h2 class="font-weight-bold text-dark mb-4 text-center">
          <i class="fas fa-plus-circle text-primary mr-2"></i> Add New Topic
        </h2>
        <p class="text-muted text-center mb-5">Create a subject you'd like to track in your learning journey.</p>
        
        <form action="{% url 'MainApp:new_topic' %}" method="post" class="form">
          {% csrf_token %}
          {% bootstrap_form form layout='vertical' %}
          <div class="mt-5">
            <button name="submit" class="btn btn-primary btn-block btn-lg shadow rounded-pill py-3">Create Topic</button>
            <a href="{% url 'MainApp:topics' %}" class="btn btn-link btn-block text-muted mt-2">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
