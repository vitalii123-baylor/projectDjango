{% extends "MainApp/base.html" %}
{% load bootstrap4 %}

{% block content %}
  <h3 class="mb-4">Add a new topic:</h3>

  <form action="{% url 'MainApp:new_topic' %}" method="post" class="form">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% buttons %}
      <button name="submit" class="btn btn-primary">Add topic</button>
    {% endbuttons %}
  </form>
{% endblock content %}
